name: CO-RE Compliance Check

on:
  push:
    branches: [ "main" ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-core:
    name: Verify eBPF CO-RE
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install LLVM, Clang, and BPF tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            llvm \
            libbpf-dev \
            linux-tools-common \
            linux-tools-generic \
            linux-tools-azure \
            linux-cloud-tools-azure \
            linux-tools-$(uname -r) \
            linux-cloud-tools-$(uname -r) \
            linux-headers-$(uname -r) \
            git \
            build-essential \
            libelf-dev \
            zlib1g-dev \
            libcap-ng-dev \
            pkg-config

      - name: Build and install bpftool from source (libbpf/bpftool)
        run: |
          git clone --depth 1 --recurse-submodules https://github.com/libbpf/bpftool.git /tmp/bpftool
          cd /tmp/bpftool/src
          make -j$(nproc)
          sudo make install
          sudo ldconfig
          bpftool version

      - name: Generate vmlinux.h
        run: |
          mkdir -p bpf/include
          bpftool btf dump file /sys/kernel/btf/vmlinux format c > bpf/include/vmlinux.h

      - name: Run CO-RE Verification Pipeline
        run: ./scripts/co-re.sh
