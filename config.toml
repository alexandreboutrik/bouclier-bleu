# =============================================================================
# Bouclier Bleu - Core Engine Configuration
# =============================================================================
# This configuration file dictates the initial enforcement state of the EDR 
# upon daemon startup.
#
# Modules explicitly set to 'false' are loaded into the eBPF subsystem but
# remain architecturally dormant (executing a zero-cost fast-path) until
# dynamically invoked via the Control Plane IPC.
#
# Reference: docs/MODULES.md for detailed cryptographic and heuristic schemas.
# =============================================================================

[modules]

# -----------------------------------------------------------------------------
# I. Core System Self-Defense
# -----------------------------------------------------------------------------
# Tamper-protection for the Bouclier Bleu architecture and host kernel
# integrity.

# Self-Defense Architecture
# Enforces immutable access policies over EDR configuration, binaries, and
# kernel syslog.
shield = true

# -----------------------------------------------------------------------------
# II. Ransomware & Filesystem Integrity
# -----------------------------------------------------------------------------
# Heuristics designed to detect and intercept unauthorized mass-encryption
# events and destructive filesystem operations.

# Ransomware Rename Entropy Monitor
# Analyzes Shannon entropy of filesystem rename operations to intercept
# encryption.
# rename_entropy = false

# -----------------------------------------------------------------------------
# III. Memory Corruption & Exploit Mitigation
# -----------------------------------------------------------------------------
# Defense-in-depth mechanisms neutralizing buffer overflows, ROP chain staging,
# and unauthorized memory manipulations.

# Strict Write XOR Execute (W^X)
# Mitigates in-memory shellcode staging by preventing concurrent W/X page
# permissions.
# strict_wx = false

# Process Injection & Credential Dumping Prevention
# Restricts unauthorized ptrace attachment, hollow process injection, and
# memory scraping.
# ptrace_block = false

# Unprivileged Dump Restriction
# Neutralizes ASLR bypass vectors by preventing unprivileged processes from
# forcing core dumps.
# dump_restrict = false

# -----------------------------------------------------------------------------
# IV. Execution Control & Attack Surface Reduction
# -----------------------------------------------------------------------------
# Policies restricting initial access vectors, dropper execution, and payload
# staging.

# Untrusted Path Execution Prevention
# Blocks binary execution from volatile or world-writable directories (e.g.,
# /tmp, /dev/shm).
exec_block = true

# Removable Media Neutralizer
# Enforces MS_NOEXEC and MS_NOSUID attributes globally on external storage
# mounts.
mount_secure = true

# -----------------------------------------------------------------------------
# V. Privilege Escalation & Container Security
# -----------------------------------------------------------------------------
# Safeguards against nested namespace abuse and host-level boundary violations.

# Namespace Escape Monitor
# Prevents unprivileged user namespace creation and restricts CAP_SYS_ADMIN
# inside containers.
# userns_restrict = false
